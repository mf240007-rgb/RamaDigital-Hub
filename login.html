<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RamaDigital Hub</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --warna-utama: #1a73e8;
            --warna-aksen: #ff6d00;
            --warna-gelap: #1c2b4a;
        }

        body {
            background: linear-gradient(135deg, var(--warna-gelap) 0%, var(--warna-utama) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--warna-gelap);
            margin-bottom: 10px;
        }

        .login-header span {
            color: var(--warna-aksen);
        }

        .login-header p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: var(--warna-gelap);
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--warna-utama);
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            background-color: var(--warna-utama);
            border: none;
            color: white;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .btn-login:hover {
            background-color: #1557b0;
            color: white;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }

        .auth-link a {
            color: var(--warna-utama);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--warna-utama);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            color: #1557b0;
        }

        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="/" class="back-link">
            <i class="bi bi-arrow-left me-2"></i>Kembali
        </a>

        <div class="login-header">
            <h1>
                <i class="bi bi-printer-fill" style="color: var(--warna-aksen);"></i>
                Rama<span>Digital</span> Hub
            </h1>
            <p>Masuk untuk memesan jasa cetak dokumen</p>
        </div>

        
        
        
        <form action="http://127.0.0.1:8000/login" method="POST">
            <input type="hidden" name="_token" value="elZ3vRs4aluv6dFCEDPTPG5Dsn6O4foRMRGIb2P0" autocomplete="off">
            
            <div class="form-group">
                <label for="full_name" class="form-label">
                    <i class="bi bi-person me-2"></i>Nama Lengkap
                </label>
                <input type="text"
                       class="form-control "
                       id="full_name"
                       name="full_name"
                       value=""
                       placeholder="Nama lengkap"
                       required>
                            </div>

            
            <div class="form-group">
                <label for="whatsapp" class="form-label">
                    <i class="bi bi-whatsapp me-2"></i>Nomor WhatsApp
                </label>
                <input type="tel"
                       class="form-control "
                       id="whatsapp"
                       name="whatsapp"
                       value=""
                       placeholder="08xxxxxxxxxx"
                       required>
                            </div>

            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-2"></i>Password
                </label>
                <input type="password"
                       class="form-control "
                       id="password"
                       name="password"
                       placeholder="Masukkan password"
                       required>
                            </div>

            
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
            </button>
        </form>

        
        <div class="auth-link">
            Belum punya akun?
            <a href="http://127.0.0.1:8000/register">Daftar di sini</a>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jyor3NBAIsDfCxnXHcpkEPRiNqaEB"
            crossorigin="anonymous"></script>

</body>
</html>
